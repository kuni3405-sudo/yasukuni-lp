  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

900;font-size:21px;display:flex;align-items:center;justify-content:center\">{{ st.n }}\u003C/div>\n              \u003Cdiv style=\"margin-top:14px;font-size:13px;color:var(--muted);font-weight:600\">{{ st.phase }}\u003C/div>\n              \u003Cdiv style=\"margin-top:4px;font-weight:900;font-size:18px;color:var(--ink)\">{{ st.tool }}\u003C/div>\n            \u003C/div>\n            \u003Csc-if value=\"{{ st.notLast }}\" hint-placeholder-val=\"{{ true }}\">\n              \u003Cdiv style=\"flex:none;width:34px;color:var(--amber);font-size:26px;font-weight:900;text-align:center\">→\u003C/div>\n            \u003C/sc-if>\n          \u003C/div>\n        \u003C/sc-for>\n      \u003C/div>\n      \u003Cp style=\"margin-top:16px;font-size:12px;color:var(--muted)\">※ 図は早見表です。今いる段階だけ見ればOK\u003C/p>\n    \u003C/div>\n  \u003C/section>\n\n  \u003Csection id=\"tools\" style=\"padding:clamp(56px,8vw,100px) clamp(20px,5vw,40px)\">\n    \u003Cdiv style=\"max-width:920px;margin:0 auto\">\n      \u003Cdiv style=\"text-align:center;margin-bottom:clamp(36px,5vw,56px)\">\n        \u003Cp style=\"color:var(--amber-d);font-weight:800;font-size:13px;letter-spacing:.1em;margin:0\">TOOLS\u003C/p>\n        \u003Ch2 style=\"font-family:'Zen Kaku Gothic New',sans-serif;font-weight:900;font-size:clamp(26px,4vw,40px);margin:10px 0 0;color:var(--ink)\">自分が実際に使っている道具\u003C/h2>\n      \u003C/div>\n      \u003Cdiv style=\"display:flex;flex-direction:column;gap:clamp(24px,3.5vw,40px)\">\n        \u003Csc-for list=\"{{ tools }}\" as=\"t\" hint-placeholder-count=\"4\">\n          \u003Carticle style=\"background:var(--card-bg);border:var(--card-border);border-left:var(--bar) solid var(--card-accent);border-radius:var(--card-radius);box-shadow:var(--card-shadow);padding:clamp(24px,4vw,44px)\">\n            \u003Cdiv style=\"display:flex;align-items:center;gap:14px;flex-wrap:wrap\">\n              \u003Cspan style=\"font-family:'Zen Kaku Gothic New',sans-serif;font-weight:900;font-size:clamp(30px,5vw,46px);color:var(--card-accent);line-height:1\">{{ t.step }}\u003C/span>\n              \u003Cspan style=\"background:var(--badge-bg);color:var(--badge-fg);font-weight:700;font-size:13px;padding:7px 14px;border-radius:999px\">{{ t.stage }}\u003C/span>\n            \u003C/div>\n            \u003Ch3 style=\"font-family:'Zen Kaku Gothic New',sans-serif;font-weight:900;font-size:clamp(24px,3.5vw,34px);margin:16px 0 0;color:var(--ink)\">{{ t.name }}\u003C/h3>\n            \u003Cp style=\"font-size:clamp(16px,2vw,20px);font-weight:700;color:var(--teal-d);margin:8px 0 0\">{{ t.tagline }}\u003C/p>\n            \u003Cdiv style=\"margin-top:16px;display:flex;flex-direction:column;gap:12px\">\n              \u003Csc-for list=\"{{ t.body }}\" as=\"para\" hint-placeholder-count=\"2\">\n                \u003Cp style=\"margin:0;font-size:clamp(15px,1.7vw,17px);line-height:1.95;color:var(--muted)\">{{ para }}\u003C/p>\n              \u003C/sc-for>\n            \u003C/div>\n            \u003Cdiv style=\"display:inline-flex;align-items:center;gap:8px;margin-top:18px;background:var(--tint);color:var(--teal-d);font-size:13px;font-weight:700;padding:8px 14px;border-radius:10px\">こんな段階の人に：{{ t.forWho }}\u003C/div>\n            \u003Cdiv style=\"display:flex;gap:12px;flex-wrap:wrap;margin-top:22px\">\n              \u003Csc-for list=\"{{ t.links }}\" as=\"lk\" hint-placeholder-count=\"1\">\n                \u003Ca href=\"{{ lk.url }}\" target=\"_blank\" rel=\"noopener\" style=\"{{ lk.style }}\" style-hover=\"transform:translateY(-2px)\">{{ lk.label }}\u003Cspan style=\"font-size:13px;opacity:.85\"> ↗\u003C/span>\u003C/a>\n              \u003C/sc-for>\n            \u003C/div>\n          \u003C/article>\n        \u003C/sc-for>\n      \u003C/div>\n    \u003C/div>\n  \u003C/section>\n\n  \u003Csection style=\"padding:clamp(56px,8vw,100px) clamp(20px,5vw,40px);background:var(--tint)\">\n    \u003Cdiv style=\"max-width:760px;margin:0 auto;text-align:center\">\n      \u003Cp style=\"color:var(--amber-d);font-weight:800;font-size:13px;letter-spacing:.1em;margin:0\">SUMMARY\u003C/p>\n      \u003Ch2 style=\"font-family:'Zen Kaku Gothic New',sans-serif;font-weight:900;font-size:clamp(26px,4vw,40px);margin:10px 0 0;color:var(--ink)\">今いる段階のものだけでいい\u003C/h2>\n      \u003Cp style=\"color:var(--muted);margin:16px auto 0;max-width:560px;line-height:1.9;font-size:clamp(15px,1.8vw,17px)\">道具は、進んだ段階で1つずつ足していけば十分。最初から全部を抱える必要はありません。必要になったときに、このページへ戻ってきてください。\u003C/p>\n      \u003Cdiv style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-top:36px\">\n        \u003Csc-for list=\"{{ summary }}\" as=\"s\" hint-placeholder-count=\"4\">\n          \u003Cdiv style=\"background:var(--card-bg);border:1px solid var(--line);border-radius:16px;padding:22px 16px\">\n            \u003Cdiv style=\"font-size:12px;color:var(--muted);font-weight:600\">{{ s.label }}\u003C/div>\n            \u003Cdiv style=\"font-weight:900;font-size:18px;margin-top:6px;color:var(--ink)\">{{ s.tool }}\u003C/div>\n          \u003C/div>\n        \u003C/sc-for>\n      \u003C/div>\n    \u003C/div>\n  \u003C/section>\n\n  \u003Csection id=\"line\" style=\"padding:clamp(56px,8vw,100px) clamp(20px,5vw,40px);background:var(--page-bg)\">\n    \u003Cdiv style=\"max-width:880px;margin:0 auto;background:linear-gradient(135deg,#06c755,#05a948);border-radius:28px;padding:clamp(36px,6vw,64px);text-align:center;color:#fff;position:relative;overflow:hidden\">\n      \u003Cdiv style=\"position:absolute;width:300px;height:300px;border-radius:50%;background:rgba(255,255,255,.12);top:-130px;right:-90px\">\u003C/div>\n      \u003Cdiv style=\"position:relative\">\n        \u003Cspan style=\"display:inline-block;background:rgba(255,255,255,.18);padding:7px 16px;border-radius:999px;font-weight:700;font-size:13px;letter-spacing:.04em\">公式LINE\u003C/span>\n        \u003Ch2 style=\"font-family:'Zen Kaku Gothic New',sans-serif;font-weight:900;font-size:clamp(24px,3.6vw,40px);margin:16px 0 0\">最初の30日でやることを、順番に\u003C/h2>\n        \u003Cp style=\"margin:16px auto 0;max-width:520px;line-height:1.9;font-size:clamp(15px,1.8vw,17px);color:rgba(255,255,255,.95)\">LINEでは、副業の最初の一歩を毎日順番に配信しています。よかったら受け取ってください。\u003C/p>\n        \u003Ca href=\"https://lin.ee/x0MJVcC\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-flex;align-items:center;gap:10px;margin-top:30px;padding:18px 42px;border-radius:999px;background:#fff;color:#05a948;font-weight:900;font-size:17px;text-decoration:none;box-shadow:0 16px 34px -14px rgba(0,0,0,.4)\" style-hover=\"transform:translateY(-2px)\">LINEで受け取る ↗\u003C/a>\n      \u003C/div>\n    \u003C/div>\n  \u003C/section>\n\n  \u003Cfooter style=\"padding:40px 24px 64px;text-align:center;border-top:1px solid var(--line);background:var(--page-bg)\">\n    \u003Cp style=\"font-size:12px;color:var(--muted);line-height:1.9;margin:0\">このメディアはアフィリエイト広告を掲載しています。\u003Cbr>ここで挙げたのは、自分が実際に使って続けられたものだけです。今の段階で要らないものは、無理に揃えなくて大丈夫です。\u003C/p>\n  \u003C/footer>\n\n\u003C/div>\n\u003C/x-dc>\n\u003Cscript type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { variant: 'B' };\n\n  renderVals() {\n    const v = this.state.variant || 'A';\n    const baseVars = {\n      '--teal': '#0d9488', '--teal-d': '#0f766e',\n      '--amber': '#f59e0b', '--amber-d': '#d97706',\n      '--ink': '#221d19', '--muted': '#6f675f', '--line': '#ece6dc'\n    };\n    const themes = {\n      A: { ...baseVars, '--page-bg': '#faf7f2', '--card-bg': '#ffffff', '--card-radius': '22px', '--card-border': '1px solid transparent', '--card-shadow': '0 22px 50px -30px rgba(15,118,110,.55)', '--bar': '0px', '--card-accent': '#f59e0b', '--badge-bg': '#fef3e2', '--badge-fg': '#b45309', '--cta-bg': '#0d9488', '--cta-fg': '#ffffff', '--tint': '#ecfdf5' },\n      B: { ...baseVars, '--page-bg': '#ffffff', '--card-bg': '#ffffff', '--card-radius': '14px', '--card-border': '1px solid #ece6dc', '--card-shadow': 'none', '--bar': '5px', '--card-accent': '#0d9488', '--badge-bg': '#ecfdf5', '--badge-fg': '#0f766e', '--cta-bg': '#0d9488', '--cta-fg': '#ffffff', '--tint': '#f6faf9' },\n      C: { ...baseVars, '--page-bg': '#faf7f2', '--card-bg': '#fff8ee', '--card-radius': '10px', '--card-border': '1.5px solid #f0dcb8', '--card-shadow': '7px 7px 0 #f1e6d2', '--bar': '0px', '--card-accent': '#d97706', '--badge-bg': '#0d9488', '--badge-fg': '#ffffff', '--cta-bg': '#d97706', '--cta-fg': '#ffffff', '--tint': '#fff3df' }\n    };\n    const rootStyle = Object.assign(\n      { fontFamily: \"'Noto Sans JP',sans-serif\", color: 'var(--ink)', background: 'var(--page-bg)', minHeight: '100vh', overflowX: 'hidden' },\n      themes[v]\n    );\n\n    const seg = (on) => ({\n      padding: '8px 16px', borderRadius: '999px', border: 'none', cursor: 'pointer',\n      fontFamily: \"'Noto Sans JP',sans-serif\", fontWeight: 700, fontSize: '12.5px',\n      background: on ? '#221d19' : 'transparent', color: on ? '#fff' : '#6f675f',\n      whiteSpace: 'nowrap', transition: 'all .15s'\n    });\n\n    const primaryBtn = {\n      display: 'inline-flex', alignItems: 'center', gap: '8px', padding: '14px 22px',\n      borderRadius: '999px', background: 'var(--cta-bg)', color: 'var(--cta-fg)',\n      fontWeight: 700, fontSize: '15px', textDecoration: 'none',\n      border: '2px solid var(--cta-bg)', transition: 'transform .15s'\n    };\n    const ghostBtn = {\n      display: 'inline-flex', alignItems: 'center', gap: '8px', padding: '12px 20px',\n      borderRadius: '999px', background: 'transparent', color: 'var(--teal-d)',\n      fontWeight: 700, fontSize: '15px', textDecoration: 'none',\n      border: '2px solid var(--line)', transition: 'transform .15s'\n    };\n    const mkLinks = (arr) => arr.map(l => ({ ...l, style: l.kind === 'primary' ? primaryBtn : ghostBtn }));\n\n    const tools = [\n      {\n        step: '01', stage: '最初の1円', name: 'ココナラ', tagline: '最初の「人からお金をもらう体験」に',\n        body: [\n          '記事を書くより先に、小さくても誰かからお金をもらう経験をしておくと、その後の発信が変わります。自分が最初の数百円を稼げたのもココナラでした。',\n          '出品は無料なので、売れなくても損はありません。練習のつもりで、自分の得意を1つ出してみるところから始められます。'\n        ],\n        forWho: 'これから副業を始める人',\n        links: mkLinks([{ label: 'ココナラを見る', url: 'https://px.a8.net/svt/ejp?a8mat=4B3YV8+FVK5IQ+2PEO+1HMAQQ', kind: 'primary' }])\n      },\n      {\n        step: '02', stage: '学び・インプット', name: '書籍 & Audible', tagline: '手が空いていなくても、学べる',\n        body: [\n          '移動や家事の時間に、AI関連の本を音声(Audible)で聞いています。手が空いていなくても学べるので、子育て中でも続けられました。',\n          '紙で読みたいときは、書店や図書館でも十分です。自分に合いそうな1冊を、無理のない形で選んでみてください。'\n        ],\n        forWho: 'インプットを習慣にしたい人',\n        links: mkLinks([\n          { label: 'Audibleを見る（無料体験）', url: 'https://px.a8.net/svt/ejp?a8mat=4B3YV8+G6VE0I+5TB0+5YRHE', kind: 'primary' }\n        ])\n      },\n      {\n        step: '03', stage: '動画（リール・TikTok）', name: 'Filmora', tagline: '動画を出すと、伸び方が変わった',\n        body: [\n          'SNSで動画を出すようになって、伸び方が変わりました。編集ソフト選びで最初つまずきましたが、今はFilmoraに落ち着いています。',\n          '無料版でも試せます（書き出しに透かしは入ります）。動画をやらない段階なら、ここは読み飛ばして大丈夫です。'\n        ],\n        forWho: 'リール・TikTokを始めたい人',\n        links: mkLinks([{ label: 'Filmoraレビュー記事を読む', url: 'https://note.com/yasukuni1004/n/n8d55715ccbcb', kind: 'primary' }])\n      },\n      {\n        step: '04', stage: '資産化（ブログ）', name: 'レンタルサーバー', tagline: '書いた記事を、資産として残す',\n        body: [\n          'noteに慣れて「自分の場所（ブログ）を持ちたい」と思ったら、サーバーが要ります。書いた記事が資産として残るのが強みです。',\n          '自分が使っているのはこの2つです。まだnoteで十分という段階なら、今は不要。次に行きたくなったら戻ってきてください。'\n        ],\n        forWho: 'ブログで資産化したい人',\n        links: mkLinks([\n          { label: 'シン・レンタルサーバー', url: 'https://px.a8.net/svt/ejp?a8mat=4B3YV8+F4RNAQ+5GDG+5YZ76', kind: 'primary' },\n          { label: 'ConoHa WING', url: 'https://px.a8.net/svt/ejp?a8mat=4B3YV8+F0LM2A+50+5SDXG2', kind: 'primary' }\n        ])\n      }\n    ];\n\n    const stages = [\n      { n: '01', phase: '最初の1円', tool: 'ココナラ', notLast: true },\n      { n: '02', phase: '学び', tool: '書籍・Audible', notLast: true },\n      { n: '03', phase: '動画', tool: 'Filmora', notLast: true },\n      { n: '04', phase: '資産化', tool: 'サーバー', notLast: false }\n    ];\n\n    const summary = [\n      { label: '最初の1円', tool: 'ココナラ' },\n      { label: '学び', tool: '書籍・Audible' },\n      { label: '動画', tool: 'Filmora' },\n      { label: '資産化', tool: 'サーバー' }\n    ];\n\n    return {\n      variant: v,\n      isA: v === 'A', isB: v === 'B', isC: v === 'C',\n      rootStyle,\n      sa: seg(v === 'A'), sb: seg(v === 'B'), sc: seg(v === 'C'),\n      pickA: () => this.setState({ variant: 'A' }),\n      pickB: () => this.setState({ variant: 'B' }),\n      pickC: () => this.setState({ variant: 'C' }),\n      tools, stages, summary\n    };\n  }\n}\n\u003C/script>\n\n\n\u003C/body>\u003C/html>"
  </script>
</body>
</html>
